<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>National Talent Test 2026</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

.title{
    font-size:3vw;
    font-weight:bold;
    margin-top:10px;
    line-height:1.2;
}

.line{
    width:90%;
    margin:10px auto;
    border-top:2px solid gold;
}

.label{
    color:gold;
    font-size:2vw;
    font-weight:bold;
}

.program{
    font-size:5vw;
    font-weight:bold;
    margin-bottom:10px;
}

.chest{
    font-size:6vw;
    font-weight:bold;
    margin-top:5px;
}

.timer{
    font-size:17vw;
    font-weight:bold;
    line-height:0.9;
    color:lime;
}

.green{
    color:lime;
}

.orange{
    color:orange;
}

.red{
    color:red;
}

.flash{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.2;
    }
}

.bottomPanel{
    margin-top:10px;
}

input{
    font-size:1.5vw;
    padding:8px;
    width:180px;
    text-align:center;
}

button{
    padding:10px 20px;
    margin:4px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:1.3vw;
    font-weight:bold;
}

.start{
    background:#00aa44;
    color:white;
}

.pause{
    background:#ff8800;
    color:white;
}

.reset{
    background:#cc0000;
    color:white;
}

.full{
    background:#0055cc;
    color:white;
}

</style>

</head>

<body>

<div class="title">
Church of God UAE<br>
YPE and SS National Talent Test 2026
</div>

<div class="line"></div>

<div class="label">PROGRAM</div>

<div class="program">
SOLO
</div>

<div class="label">CHEST NO.</div>

<div id="chest" class="chest">
101
</div>

<div id="timer" class="timer green">
00:00
</div>

<div class="bottomPanel">

<input id="chestInput" placeholder="Chest No">

<button onclick="loadChest()">
LOAD
</button>

<br><br>

<button class="start" onclick="startTimer()">
START
</button>

<button class="pause" onclick="pauseTimer()">
PAUSE
</button>

<button class="reset" onclick="resetTimer()">
RESET
</button>

<button class="full" onclick="openFullscreen()">
FULLSCREEN
</button>

</div>

<div class="line"></div>

<script>

let seconds=0;
let interval=null;

function loadChest(){

document.getElementById("chest").innerHTML=
document.getElementById("chestInput").value;

}

function startTimer(){

if(interval) return;

interval=setInterval(()=>{

seconds++;

let min=Math.floor(seconds/60);
let sec=seconds%60;

document.getElementById("timer").innerHTML=
String(min).padStart(2,'0') + ":" +
String(sec).padStart(2,'0');

let timer=document.getElementById("timer");

timer.classList.remove("green","orange","red","flash");

if(seconds<=110){

timer.classList.add("green");

}
else if(seconds<=120){

timer.classList.add("orange");

}
else{

timer.classList.add("red");
timer.classList.add("flash");

}

},1000);

}

function pauseTimer(){

clearInterval(interval);
interval=null;

}

function resetTimer(){

pauseTimer();

seconds=0;

let timer=document.getElementById("timer");

timer.innerHTML="00:00";

timer.classList.remove("orange","red","flash");
timer.classList.add("green");

}

function openFullscreen(){

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

}

</script>

</body>
</html>
